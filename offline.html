<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>オフライン — JOURNEY LENS</title>
<meta name="theme-color" content="#13150F">
<link rel="icon" href="/icons/icon-192.png">
<style>
  :root{--bg:#13150F;--ink:#E7E4DB;--soft:#8C8A80;--gold:#CF9C4E;--line:rgba(231,228,219,.14)}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Cormorant Garamond",Georgia,"Times New Roman","Yu Mincho",serif;
    display:flex;align-items:center;justify-content:center;padding:32px;text-align:center}
  .wrap{max-width:520px}
  .mark{font-family:Georgia,serif;font-weight:700;font-size:2.6rem;color:var(--gold);letter-spacing:.02em}
  .en{font-family:"Helvetica Neue",Arial,sans-serif;font-size:.7rem;letter-spacing:.34em;color:var(--soft);margin-top:14px}
  h1{font-weight:500;font-size:1.9rem;line-height:1.5;margin:26px 0 12px}
  p{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:.92rem;line-height:1.9;color:var(--soft)}
  a{display:inline-block;margin-top:28px;padding:11px 22px;border:1px solid var(--line);border-radius:999px;
    color:var(--ink);text-decoration:none;font-family:"Helvetica Neue",Arial,sans-serif;font-size:.8rem;letter-spacing:.12em}
  a:hover{color:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">J</div>
    <div class="en">JOURNEY LENS</div>
    <h1>いまはオフラインです。</h1>
    <p>接続が戻ると、続きの旅を読み込めます。<br>一度ひらいた物語は、この画面からでも辿れることがあります。</p>
    <a href="/">ホームへ戻る</a>
  </div>
</body>
</html>
