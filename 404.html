<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページが見つかりません — JOURNEY LENS</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700&family=Shippori+Mincho:wght@500&family=Spline+Sans+Mono:wght@400&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13150F; --ink:#ECE6D6; --ink-soft:#9DA08B; --line:#343829; --trail:#CF9C4E;
    --latin:"Hanken Grotesk",sans-serif; --mincho:"Shippori Mincho",serif;
    --sans:"Zen Kaku Gothic New",system-ui,sans-serif; --mono:"Spline Sans Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:32px;line-height:1.8}
  .wrap{max-width:560px}
  .code{font-family:var(--mono);font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-soft)}
  .mark{font-family:var(--latin);font-weight:700;font-size:clamp(1.6rem,5vw,2.4rem);letter-spacing:.16em;
    text-transform:uppercase;margin:18px 0 0;line-height:1}
  .rule{width:46px;height:1px;background:var(--trail);opacity:.85;margin:30px auto 30px}
  .lead{font-family:var(--mincho);font-size:clamp(1.1rem,2.4vw,1.35rem);color:var(--ink);margin:0}
  .sub{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;color:var(--ink-soft);margin:14px 0 0}
  .home{display:inline-block;margin-top:34px;font-family:var(--mono);font-size:.74rem;letter-spacing:.22em;
    color:var(--trail);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px;transition:border-color .3s}
  .home:hover{border-color:var(--trail)}
</style>
</head>
<body>
  <main class="wrap">
    <p class="code">Error 404</p>
    <p class="mark">Journey Lens</p>
    <div class="rule"></div>
    <p class="lead">ページが見つかりません。</p>
    <p class="sub">The page you are looking for doesn’t exist.</p>
    <a class="home" href="/">← トップへ戻る</a>
  </main>
</body>
</html>
